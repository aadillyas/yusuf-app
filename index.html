<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
    }

    #new-btn {
      background: #2563eb;
      color: #fff;
      padding: 8px 16px;
    }

    #new-btn:hover { background: #1d4ed8; }

    main {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 24px;
    }

    #empty {
      text-align: center;
      color: #888;
      margin-top: 80px;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
    }

    .card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card p {
      font-size: 0.85rem;
      color: #555;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .edit-btn {
      background: #f0f0f0;
      color: #333;
      padding: 5px 12px;
    }

    .edit-btn:hover { background: #e0e0e0; }

    .delete-btn {
      background: #fee2e2;
      color: #dc2626;
      padding: 5px 12px;
    }

    .delete-btn:hover { background: #fecaca; }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }

    .modal h2 { font-size: 1.1rem; }

    .modal input, .modal textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
    }

    .modal input:focus, .modal textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .modal textarea { resize: vertical; min-height: 140px; }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .cancel-btn {
      background: #f0f0f0;
      color: #333;
      padding: 8px 18px;
    }

    .cancel-btn:hover { background: #e0e0e0; }

    .save-btn {
      background: #2563eb;
      color: #fff;
      padding: 8px 18px;
    }

    .save-btn:hover { background: #1d4ed8; }

    .date {
      font-size: 0.75rem;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>Notes</h1>
  <button id="new-btn" onclick="openModal()">+ New Note</button>
</header>

<main>
  <div id="empty">No notes yet. Hit <strong>+ New Note</strong> to start.</div>
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="modal">
    <h2 id="modal-title">New Note</h2>
    <input id="note-title" type="text" placeholder="Title" maxlength="80" />
    <textarea id="note-body" placeholder="Write your note here..."></textarea>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="save-btn" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<script>
  let notes = JSON.parse(localStorage.getItem('notes') || '[]');
  let editingId = null;

  function render() {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    grid.innerHTML = '';
    if (notes.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    notes.slice().reverse().forEach(note => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h2>${esc(note.title || 'Untitled')}</h2>
        <p>${esc(note.body)}</p>
        <span class="date">${note.date}</span>
        <div class="card-actions">
          <button class="edit-btn" onclick="openModal(${note.id})">Edit</button>
          <button class="delete-btn" onclick="deleteNote(${note.id})">Delete</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function openModal(id) {
    editingId = id || null;
    document.getElementById('modal-title').textContent = id ? 'Edit Note' : 'New Note';
    if (id) {
      const note = notes.find(n => n.id === id);
      document.getElementById('note-title').value = note.title;
      document.getElementById('note-body').value = note.body;
    } else {
      document.getElementById('note-title').value = '';
      document.getElementById('note-body').value = '';
    }
    document.getElementById('overlay').classList.add('open');
    document.getElementById('note-title').focus();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
  }

  function closeIfOutside(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  function saveNote() {
    const title = document.getElementById('note-title').value.trim();
    const body = document.getElementById('note-body').value.trim();
    if (!body && !title) return;
    const now = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    if (editingId) {
      const note = notes.find(n => n.id === editingId);
      note.title = title;
      note.body = body;
      note.date = now;
    } else {
      notes.push({ id: Date.now(), title, body, date: now });
    }
    localStorage.setItem('notes', JSON.stringify(notes));
    closeModal();
    render();
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    localStorage.setItem('notes', JSON.stringify(notes));
    render();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  render();
</script>
</body>
</html>
